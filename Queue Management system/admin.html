<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Admin Portal — Analytics and Management." />
  <title>Admin Portal — MediQueue AI</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .admin-layout { max-width: 1200px; margin: 0 auto; padding: 24px; position: relative; z-index: 1; }
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
    .kpi-card { background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); padding: 24px; text-align: center; }
    .kpi-value { font-size: 36px; font-weight: 800; background: var(--gradient-main); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .kpi-label { font-size: 14px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 8px; }
    .charts-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
    .chart-card { background: var(--bg-card); border: 1px solid var(--border-glass); border-radius: var(--radius-lg); padding: 24px; }
    .chart-container { position: relative; height: 300px; width: 100%; margin-top: 16px; }
    @media (max-width: 768px) { .kpi-grid { grid-template-columns: 1fr 1fr; } .charts-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="bg-mesh"></div>
  
  <nav class="navbar">
    <a class="navbar-brand" href="index.html">
      <div class="navbar-logo">📊</div>
      <div>
        <div class="navbar-title">MediQueue <span class="gradient-text">AI</span></div>
        <div class="navbar-subtitle">Admin Dashboard</div>
      </div>
    </a>
    <div class="navbar-actions">
      <button class="dark-toggle" onclick="App.toggleDarkMode()"><div class="dark-toggle-thumb">🌙</div></button>
      <a href="index.html" class="btn btn-danger btn-sm">Logout</a>
    </div>
  </nav>

  <div class="admin-layout">
    <h2 class="section-title" style="margin-bottom: 24px;">📈 System Overview</h2>
    
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-value">3,492</div><div class="kpi-label">Total Patients (Today)</div></div>
      <div class="kpi-card"><div class="kpi-value" style="background:var(--teal-400);-webkit-background-clip:text;">18m</div><div class="kpi-label">Avg Wait Time</div></div>
      <div class="kpi-card"><div class="kpi-value" style="background:var(--purple-400);-webkit-background-clip:text;">98.2%</div><div class="kpi-label">System Uptime</div></div>
      <div class="kpi-card"><div class="kpi-value" style="background:var(--red-400);-webkit-background-clip:text;">14</div><div class="kpi-label">Emergencies Handled</div></div>
    </div>

    <div class="charts-grid">
      <div class="chart-card">
        <h3 class="font-bold text-lg">Patient Footfall by Department</h3>
        <div class="chart-container"><canvas id="deptChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3 class="font-bold text-lg">Average Wait Time Trend (Hourly)</h3>
        <div class="chart-container"><canvas id="waitChart"></canvas></div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Setup Charts
      Chart.defaults.color = 'rgba(255,255,255,0.7)';
      Chart.defaults.borderColor = 'rgba(255,255,255,0.1)';

      const ctxDept = document.getElementById('deptChart').getContext('2d');
      new Chart(ctxDept, {
        type: 'doughnut',
        data: {
          labels: ['Cardiology', 'Neurology', 'Orthopedics', 'Pediatrics', 'General', 'Other'],
          datasets: [{
            data: [25, 15, 20, 10, 20, 10],
            backgroundColor: ['#fc8181', '#b794f4', '#63b3ed', '#f6ad55', '#4fd1c5', '#9f7aea'],
            borderWidth: 0
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });

      const ctxWait = document.getElementById('waitChart').getContext('2d');
      new Chart(ctxWait, {
        type: 'line',
        data: {
          labels: ['9 AM', '10 AM', '11 AM', '12 PM', '1 PM', '2 PM', '3 PM', '4 PM'],
          datasets: [{
            label: 'Wait Time (mins)',
            data: [15, 20, 35, 45, 25, 18, 22, 16],
            borderColor: '#63b3ed',
            tension: 0.4,
            fill: true,
            backgroundColor: 'rgba(99,179,237,0.2)'
          }]
        },
        options: { responsive: true, maintainAspectRatio: false }
      });
    });
  </script>
</body>
</html>
